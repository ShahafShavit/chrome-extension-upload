name: 'Upload to Chrome Web Store'
description: 'A better, easier way to upload and publish Chrome extensions to the Chrome Web Store from GitHub Actions.'
author: 'ShahafShavit'
branding:
  color: blue
  icon: upload-cloud
inputs:
  file-path:
    description: 'Path to your packaged extension (.zip), relative to the repository root.'
    required: true
  extension-id:
    description: 'Your item ID from the Chrome Web Store (the id in the store URL and Developer Dashboard).'
    required: true
  publisher-id:
    description: >-
      Optional. Your Publisher ID from Developer Dashboard → Account. If set, the action uses Chrome Web Store API v2
      (recommended). If left empty, the action uses legacy API v1.1 for backward compatibility; Google plans to turn off
      v1 after October 15, 2026.
    required: false
    default: ''
  client-id:
    description: 'OAuth 2.0 Client ID from Google Cloud Console (same project where Chrome Web Store API is enabled).'
    required: true
  client-secret:
    description: 'OAuth 2.0 Client Secret for that client.'
    required: true
  refresh-token:
    description: 'OAuth 2.0 refresh token with scope https://www.googleapis.com/auth/chromewebstore (see Chrome Web Store API docs).'
    required: true
  glob:
    description: 'If true, `file-path` is treated as a glob; the first matching file is uploaded.'
    required: false
    default: 'false'
  publish:
    description: 'If true (default), submits the new package for publishing after upload. Set false to upload only (e.g. for testing).'
    required: false
    default: 'true'
  publish-target:
    required: false
    description: 'Legacy v1 only: `default` or `trustedTesters`. With API v2, visibility is managed in the Developer Dashboard.'
    default: 'default'
runs:
  using: 'node24'
  main: 'dist/index.js'
