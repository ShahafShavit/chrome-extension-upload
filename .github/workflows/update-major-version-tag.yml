name: Update major version tag

# When you publish a release (e.g. v1.2.0), move the floating tag v1 to that commit
# so consumers can pin uses: ShahafShavit/chrome-extension-upload@v1

on:
  release:
    types: [published]

jobs:
  update-major-tag:
    if: ${{ !github.event.release.prerelease && !github.event.release.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Move vMAJOR to this release
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${TAG_NAME}' is not vMAJOR.MINOR.PATCH — not updating floating major tag."
            exit 0
          fi

          MAJOR="${TAG_NAME%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -fa "${MAJOR}" -m "Track latest ${MAJOR}.x (${TAG_NAME})"
          git push origin "refs/tags/${MAJOR}" --force

          echo "Updated ${MAJOR} -> ${TAG_NAME}"
